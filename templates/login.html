<!DOCTYPE html>
<html>
    <head>
        <title>Login</title>
        <link rel="stylesheet"  href="{{url_for('static',filename='style.css')}}">
    </head>
    <body>
        <nav>
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
        <a href="/signup">Sign up</a>
        <a href="/login">Login</a>  
        <a href="/dashboard">Dashboard</a>
        </nav>
        <div class="container">

        <h1>Login</h1>

        <form method="POST">
            <input
            type="text"
            name="username"
            placeholder="Enter username"
            required
            >

            <input
            type="password"
            name="password"
            placeholder="Enter password"
            required
            >

            <button type="submit">
                Login
            </button>
        </form>

        <div class="error">
            {{message}}
        </div>

        <br>

        <p>
            New User?

            <a href="{{url_for('signup')}}">Sign up</a>
        </p>
        </div>
    </body>
</html>
